        function updateCheckoutLinks() {
          const elements = document.querySelectorAll("a[href]");

          elements.forEach(function (element) {

            if (

            }

        document.addEventListener(

          function (event) {

            if (!target) return;

            const href = target.getAttribute("href") || "";

            if (
              href.includes("ggcheckout.app/checkout") ||
              href.includes("kuEX7imkNPeRnDU5Cv2M")
            ) {
              event.preventDefault();
              window.location.href = CHECKOUT_V4;
            }
          },
          true
        );

        window.addEventListener("load", updateCheckoutLinks);

        const observer = new MutationObserver(updateCheckoutLinks);

        document.addEventListener("DOMContentLoaded", function () {
          updateCheckoutLinks();

          observer.observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ["href"],
          });
        });
      })();
